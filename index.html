<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlobalMart — Your World. Your Market.</title>
    <meta name="description" content="GlobalMart: Discover amazing products from sellers worldwide. Shop global, buy local with our curated marketplace.">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&family=Lexend+Deca:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "brutal-yellow": "#FFE600",
                        "brutal-blue": "#2D5BFF",
                        "brutal-pink": "#FF60AD",
                        "brutal-green": "#00E676",
                        "brutal-red": "#FF3B30",
                        "brutal-orange": "#FF9100",
                        "neo-cyan": "#33D2FF",
                        "neo-lime": "#C3F2CB",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "syne": ["Syne", "sans-serif"],
                    },
                    boxShadow: {
                        'brutal': '4px 4px 0px 0px rgba(0,0,0,1)',
                        'brutal-lg': '8px 8px 0px 0px rgba(0,0,0,1)',
                        'brutal-xl': '12px 12px 0px 0px rgba(0,0,0,1)',
                        'brutal-active': '2px 2px 0px 0px rgba(0,0,0,1)',
                    },
                    borderWidth: {
                        '3': '3px',
                        '4': '4px',
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background-color: #ffffff;
        }
        .dot-grid {
            background-image: radial-gradient(#000 1.5px, transparent 0);
            background-size: 24px 24px;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 700, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1, 'wght' 700, 'GRAD' 0, 'opsz' 24;
        }
    </style>
